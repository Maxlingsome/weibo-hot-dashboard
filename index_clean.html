<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<title>热搜Skill</title>
<style>
/* === Design: Editorial Dashboard === */
:root {
  --bg: #08080c;
  --surface: #0f0f15;
  --surface-raised: #14141c;
  --border: rgba(255,255,255,.07);
  --border-strong: rgba(255,255,255,.12);
  --ink: #ededf0;
  --ink-dim: rgba(255,255,255,.52);
  --ink-muted: rgba(255,255,255,.28);
  --wb: #ff3b5c;
  --wb-glow: rgba(255,59,92,.12);
  --dy: #ff5e82;
  --amber: #fbbf24;
  --radius: 14px;
  --radius-sm: 8px;
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
}

*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
}

body::before{
  content: '';
  position: fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 15% 5%, rgba(255,59,92,.04) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 90%, rgba(255,94,130,.03) 0%, transparent 55%);
}

/* === Layout === */
.container{max-width:960px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}

/* === Header === */
header{padding:36px 0 28px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
header .brand{font-size:20px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
header .brand-dots{display:flex;gap:5px}
header .brand-dots span{width:7px;height:7px;border-radius:50%}
header .brand-dots .w{background:var(--wb);box-shadow:0 0 8px var(--wb-glow)}
header .brand-dots .d{background:var(--dy);box-shadow:0 0 8px rgba(255,94,130,.12)}
header .live{font-size:11px;color:var(--ink-muted);font-weight:500;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
header .live .pulse{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 2.5s ease-in-out infinite;box-shadow:0 0 6px rgba(34,197,94,.4)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}

/* === Tab Bar === */
.tab-bar{
  display:flex;gap:2px;margin:0 auto 28px;width:fit-content;
  background:var(--surface-raised);
  border:1px solid var(--border-strong);
  border-radius:100px;padding:4px;position:sticky;top:16px;z-index:100;
}
.tab-bar button{
  padding:8px 18px;border:none;cursor:pointer;font-size:12.5px;font-weight:600;
  color:var(--ink-dim);background:transparent;border-radius:100px;
  transition:all .25s var(--ease);font-family:inherit;white-space:nowrap;
}
.tab-bar button.active{background:rgba(255,255,255,.1);color:#fff}
.tab-bar button:hover:not(.active){color:rgba(255,255,255,.7)}
.tab-content{display:none}
.tab-content.active{display:block}

/* === Section header === */
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-hd h2{font-size:16px;font-weight:700;letter-spacing:-.01em}
.section-hd .meta{font-size:12px;color:var(--ink-dim)}

/* === Stats Row === */
.stats-row{display:flex;gap:0;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.stats-row .stat-item{flex:1;padding:18px 20px;text-align:center}
.stats-row .stat-item+.stat-item{border-left:1px solid var(--border)}
.stat-item .stat-label{font-size:10.5px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:6px}
.stat-item .stat-val{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.stat-item .stat-sub{font-size:11px;color:var(--ink-dim);margin-top:4px}
.stat-item .stat-val.wb{color:var(--wb)}
.stat-item .stat-val.dy{color:var(--dy)}
.stat-item .topic-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:18px}
@media(max-width:640px){.stat-item .topic-name{font-size:15px}}

/* === Panel (single-layer card) === */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:14px;
}
.panel-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.panel-hd h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.platform-card .panel-hd h2{font-size:42px}
.panel-hd .accent-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.panel-hd .meta{font-size:11px;color:var(--ink-dim);font-weight:400}

/* === Table === */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:6px 10px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
tbody tr{transition:background .15s}
tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
tbody tr:hover{background:rgba(255,255,255,.04)}
tbody td{padding:8px 10px;vertical-align:middle}
.rank{font-weight:700;font-variant-numeric:tabular-nums;width:32px;text-align:center;font-size:13px}
.rank.wb-top{color:var(--wb)}
.rank.dy-top{color:var(--dy)}
.word a{color:var(--ink);text-decoration:none;transition:color .2s}
.word a:hover{color:var(--wb)}
a.dy-link:hover{color:var(--dy)!important}
.hot-val{color:var(--ink-dim);font-size:12px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.badge{color:var(--wb);font-size:10px;font-weight:700;vertical-align:middle;margin-left:2px}
.label-cell{font-size:11px;color:var(--ink-dim);font-weight:500}
.monitor-time{font-size:24px;color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.monitor-rank{font-size:15px;font-weight:700}

/* === Search === */
.search-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px}
.search-row input{
  width:100%;padding:10px 16px;
  background:rgba(255,255,255,.04);border:1px solid var(--border-strong);border-radius:100px;
  color:var(--ink);font-size:14px;font-family:inherit;outline:none;
  transition:all .25s var(--ease);
}
.search-row input:focus{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.06)}
.search-row button{
  padding:10px 24px;background:#fff;color:#000;border:none;border-radius:100px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .2s var(--ease);
}
.search-row button:hover{opacity:.9}
.search-row button:active{transform:scale(.98)}
.search-row button:disabled{opacity:.3;transform:none}
.search-toggle-wrap{display:inline-flex;gap:1px;background:rgba(255,255,255,.06);border-radius:100px;padding:2px;margin-left:6px}
.search-toggle-wrap button{padding:4px 14px;border:none;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--ink-dim);font-family:inherit;transition:all .2s var(--ease)}
.search-toggle-wrap button.active{background:rgba(255,255,255,.12);color:#fff}
.search-hint{font-size:11px;color:var(--ink-muted);margin-bottom:8px}

/* === Gen === */
.gen-card textarea{
  width:100%;height:80px;background:rgba(255,255,255,.04);border:1px solid var(--border-strong);
  border-radius:12px;padding:12px;color:#fff;font-size:14px;resize:vertical;
  font-family:inherit;outline:none;margin-bottom:10px;transition:all .25s var(--ease);
}
.gen-card textarea:focus{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.gen-card .btn-gen{
  width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:100px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s var(--ease);
}
.gen-card .btn-gen:hover{opacity:.9}
.gen-card .btn-gen:active{transform:scale(.98)}
.gen-card .btn-gen:disabled{opacity:.3;transform:none}
.gen-dir{padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;margin:8px 0;font-size:13px}
.gen-dir .dir-name{font-weight:700;color:var(--dy);margin-bottom:3px}
.gen-dir .dir-cand{padding:4px 10px;background:rgba(255,255,255,.05);border-radius:6px;margin:3px 0}
.gen-dir .dir-meta{font-size:11px;color:var(--ink-muted)}
.gen-top{background:linear-gradient(135deg,rgba(255,94,130,.08),rgba(255,59,92,.08));border:1px solid rgba(255,94,130,.15);padding:12px;border-radius:10px;margin-top:10px}

/* === Topic Detail === */
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
@media(max-width:640px){.detail-grid{grid-template-columns:repeat(2,1fr)}}
.detail-item{
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px 16px;text-align:center
}
.detail-item .dv{font-size:22px;font-weight:800;color:var(--ink)}
.detail-item .dl{font-size:10px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.trend-block{margin-top:8px}
.trend-block h4{font-size:13px;color:var(--ink-dim);font-weight:600;margin:10px 0 4px}
.trend-block canvas{display:block;border-radius:6px}

/* === Misc === */
.tag{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:600;margin-right:3px;letter-spacing:.02em}
.tag-wb{background:var(--wb-glow);color:var(--wb)}
.tag-dy{background:rgba(255,94,130,.12);color:var(--dy)}
.empty{text-align:center;padding:50px 16px;color:var(--ink-muted);font-size:13px}
.hist-pills{display:flex;gap:3px;flex-wrap:wrap;max-width:240px}
.hist-pills span{display:inline-block;padding:2px 6px;border-radius:100px;font-size:10px;background:rgba(255,255,255,.04);color:var(--ink-dim)}
.hist-pills span.top{background:rgba(255,94,130,.12);color:var(--dy)}
footer{text-align:center;padding:30px 20px;font-size:11px;color:var(--ink-muted)}

@media(max-width:600px){
  .container{padding:0 12px 40px}
  .tab-bar{position:static;margin-bottom:16px}
  .tab-bar button{padding:7px 10px;font-size:11px}
  .panel{padding:14px}
  .stats-row{flex-direction:column}
  .stats-row .stat-item+.stat-item{border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="container">
<header>
  <div class="brand">
    <div class="brand-dots"><span class="w"></span><span class="d"></span></div>
    热搜Skill
  </div>
  <div class="live"><span class="pulse"></span>实时监控</div>
</header>

<div class="tab-bar">
  <button class="active" onclick="switchTab('hot')">实时热搜</button>
  <button onclick="switchTab('search')">历史热搜</button>
  <button onclick="switchTab('generate')">我来想话题</button>
  <button onclick="switchTab('monitor')">话题监测</button>
</div>

<!-- Hot -->
<div id="tab-hot" class="tab-content active">
  <div class="section-hd"><h2>实时热搜 <span class="search-toggle-wrap" id="hotToggle"></span></h2><span class="meta" id="hotMeta">每分钟更新</span></div>
  <div id="hotContent"></div>
</div>

<!-- Search -->
<div id="tab-search" class="tab-content">
  <div class="panel">
    <div class="panel-hd"><h2>历史热搜 <span class="search-toggle-wrap"><button id="stWb" class="active" onclick="switchSearch('weibo')">微博</button><button id="stDy" onclick="switchSearch('douyin')">抖音</button></span></h2></div>
    <div class="search-hint" id="searchHint">搜索微博历史话题</div>
    <div class="search-row"><input id="searchInput" placeholder="输入关键词…" onkeydown="if(event.key==='Enter')doSearch()"><button id="searchBtn" onclick="doSearch()">搜索</button></div>
    <div id="searchResults"></div>
  </div>
</div>

<!-- Generate -->
<div id="tab-generate" class="tab-content">
  <div class="panel gen-card">
    <div class="panel-hd"><h2>我来想话题</h2></div>
    <textarea id="genInput" placeholder="输入事件描述，帮你生成热搜话题文案…"></textarea>
    <button class="btn-gen" id="genBtn" onclick="doGenerate()">生成文案</button>
    <div id="genResult"></div>
  </div>
</div>

<!-- Monitor -->
<div id="tab-monitor" class="tab-content">
  <div class="panel">
    <div class="panel-hd"><h2>全平台话题监测</h2></div>
    <div class="search-row"><input id="monitorInput" placeholder="输入精确话题词…" onkeydown="if(event.key==='Enter')doMonitor()"><button id="monitorBtn" onclick="doMonitor()">监测</button></div>
    <div id="monitorSummary"></div>
    <div id="monitorChart"></div>
    <div id="monitorTable"></div>
  </div>
</div>

<footer></footer>
</div>

<script>
// === Tab Switch ===
const TABS=['hot','search','generate','monitor'];
function switchTab(name){
  document.querySelectorAll('.tab-bar button').forEach((b,i)=>b.classList.toggle('active',i===TABS.indexOf(name)));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// === Load Weibo ===
let hotPlatform='weibo';
const hotColors={weibo:'#ff3b5c',douyin:'#ff5e82',kuaishou:'#ff4906',bilibili:'#00a1d6'};
const hotNames={weibo:'微博',douyin:'抖音',kuaishou:'快手',bilibili:'B站'};

function buildHotToggle(){
  let h='';
  for(const k in hotColors){
    h+='<button id="ht'+k+'" class="'+(k===hotPlatform?'active':'')+'" onclick="switchHot(\''+k+'\')">'+hotNames[k]+'</button>';
  }
  document.getElementById('hotToggle').innerHTML=h;
  updateHotBtnColors();
}
function updateHotBtnColors(){
  for(const k in hotColors){
    const btn=document.getElementById('ht'+k);
    if(!btn)continue;
    btn.style.background=k===hotPlatform?hotColors[k]:'transparent';
    btn.style.color=k===hotPlatform?'#fff':'var(--ink-dim)';
  }
}
function switchHot(p){
  hotPlatform=p;
  updateHotBtnColors();
  loadHotData();
}
async function loadHotData(){
  const apis={weibo:'/api/weibo',douyin:'/api/douyin',kuaishou:'/api/kuaishou',bilibili:'/api/bilibili'};
  try{
    const items=await fetch(apis[hotPlatform]).then(r=>r.json());
    if(!items.length)return;
    const d=new Date(); const ts=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    document.getElementById('hotMeta').textContent=ts+'刷新';
    let rows='';
    items.forEach(i=>{
      const rc=i.rank<=10?' style="color:'+hotColors[hotPlatform]+';font-weight:700"':'';
      if(hotPlatform==='weibo'){
        rows+='<tr><td class="rank"'+rc+'>'+i.rank+'</td><td class="word"><a href="'+i.url+'" target="_blank">'+i.title+'</a>'+(i.badge?' <span class="badge">'+i.badge+'</span>':'')+'</td><td class="label-cell">'+(i.label||'')+'</td><td class="hot-val">'+i.hot+'</td></tr>';
      }else if(hotPlatform==='bilibili'){
        rows+='<tr><td class="rank"'+rc+'>'+i.rank+'</td><td class="word"><a href="'+i.url+'" target="_blank">'+i.title+'</a></td></tr>';
      }else{
        rows+='<tr><td class="rank"'+rc+'>'+i.rank+'</td><td class="word"><a href="'+i.url+'" target="_blank">'+i.title+'</a></td><td class="hot-val">'+i.hot+'</td></tr>';
      }
    });
    const thead=hotPlatform==='weibo'
      ?'<thead><tr><th>#</th><th>话题</th><th>标签</th><th style="text-align:right">热度</th></tr></thead>'
      :'<thead><tr><th>#</th><th>话题</th>'+(hotPlatform!=='bilibili'?'<th style="text-align:right">热度</th>':'')+'</tr></thead>';
    document.getElementById('hotContent').innerHTML='<div class="panel"><table>'+thead+'<tbody>'+rows+'</tbody></table></div>';
  }catch(e){}
}

buildHotToggle();loadHotData();
setInterval(loadHotData,60000);

// === Search ===
let searchMode='weibo';

function switchSearch(m){
  searchMode=m;
  document.getElementById('stWb').classList.toggle('active',m==='weibo');
  document.getElementById('stDy').classList.toggle('active',m==='douyin');
  document.getElementById('searchHint').textContent=m==='weibo'?'搜索微博历史话题':'搜索抖音历史话题';
  document.getElementById('searchResults').innerHTML='';
}
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();if(!q)return;
  const btn=document.getElementById('searchBtn');btn.disabled=true;btn.textContent='搜索中…';
  const api=searchMode==='douyin'?'/api/search-douyin':'/api/search';
  try{
    const items=await fetch(api+'?q='+encodeURIComponent(q)).then(r=>r.json());
    const div=document.getElementById('searchResults');
    if(!items.length){div.innerHTML='<div class="empty">未找到匹配话题</div>'}
    else if(searchMode==='weibo'){
      div.innerHTML='<table style="margin-top:12px"><thead><tr><th>话题</th><th>最高</th><th>上榜</th><th>首次</th><th>最近</th></tr></thead><tbody>'+items.map(t=>{
        const pk = t.peakRank && t.peakRank>0 ? '<span style="color:var(--wb);font-weight:700">#'+t.peakRank+'</span>' : '—';
        return '<tr><td class="word"><a href="'+t.url+'" target="_blank">'+t.name+'</a></td><td style="font-weight:600">'+pk+'</td><td>'+(t.appearances||'—')+'天</td><td style="font-size:12px;color:var(--ink-dim)">'+(t.firstDate||'—')+'</td><td style="font-size:12px;color:var(--ink-dim)">'+(t.lastTime||'—')+'</td></tr>'
      }).join('')+'</tbody></table>';
    }else if(items[0]&&items[0].appearances){
      div.innerHTML='<table style="margin-top:12px"><thead><tr><th>话题</th><th>最高</th><th>上榜</th><th>首次</th><th>最近</th></tr></thead><tbody>'+items.map(t=>{
        const best = t.best_rank && t.best_rank>0 ? '<span style="color:var(--dy);font-weight:700">#'+t.best_rank+'</span>' : '—';
        return '<tr><td class="word"><a class="dy-link" href="https://www.douyin.com/search/'+encodeURIComponent(t.word)+'" target="_blank">'+t.word+'</a></td><td style="font-weight:600">'+best+'</td><td>'+(t.appearances||'—')+'天</td><td style="font-size:12px;color:var(--ink-dim)">'+(t.first_date||'—')+'</td><td style="font-size:12px;color:var(--ink-dim)">'+(t.last_date||'—')+'</td></tr>'
      }).join('')+'</tbody></table>';
    }else{
      div.innerHTML='<p style="font-size:11px;color:var(--ink-muted);margin:12px 0 4px">实时热搜匹配</p><table><thead><tr><th>#</th><th>话题</th><th style="text-align:right">热度</th></tr></thead><tbody>'+items.map(t=>'<tr><td class="rank'+(t.rank<=3?' dy-top':'')+'">'+(t.rank||'')+'</td><td class="word"><a class="dy-link" href="https://www.douyin.com/search/'+encodeURIComponent(t.word||t.title||'')+'" target="_blank">'+(t.word||t.title||'')+'</a></td><td class="hot-val">'+(t.hot||'')+'</td></tr>').join('')+'</tbody></table>';
    }
  }catch(e){document.getElementById('searchResults').innerHTML='<div class="empty">搜索失败</div>'}
  document.getElementById('searchBtn').disabled=false;document.getElementById('searchBtn').textContent='搜索';
}

// === Topic Monitor ===
function formatCount(n){
  if(n==null||n===0)return '0';
  if(n>=100000000)return (n/100000000).toFixed(1)+'亿';
  if(n>=10000)return (n/10000).toFixed(0)+'万';
  return n.toLocaleString();
}
async function doMonitor(){
  const q=document.getElementById('monitorInput').value.trim();if(!q)return;
  const btn=document.getElementById('monitorBtn');btn.disabled=true;btn.textContent='监测中…';
  try{
    const data=await fetch('/api/monitor?q='+encodeURIComponent(q)).then(r=>r.json());
    renderMonitor(data);
  }catch(e){document.getElementById('monitorSummary').innerHTML='<div class="empty">查询失败</div>'}
  btn.disabled=false;btn.textContent='监测';
}
function renderMonitor(data){
  const q=data.query;var colors={weibo:'#ff3b5c',douyin:'#ff5e82',kuaishou:'#ff4906'};
  var names={weibo:'微博',douyin:'抖音',kuaishou:'快手'};
  document.getElementById('monitorChart').innerHTML='';
  document.getElementById('monitorTable').innerHTML='';
  var found=[],maxDays=0,bestEver=999;
  for(var k in data.platforms){var v=data.platforms[k];if(v.found){found.push(k);if((v.total_days||0)>maxDays)maxDays=v.total_days||0;if(v.best_rank&&v.best_rank<bestEver)bestEver=v.best_rank}}
  if(found.length===0){document.getElementById('monitorSummary').innerHTML='<div class="empty">话题「'+q+'」暂未上榜</div>';return}

  // Summary: unified stat row
  var platformTags=found.map(function(k){return '<span class="tag tag-wb">'+names[k]+'</span>'}).join(' ');
  var daysText=maxDays>0?maxDays+' 天':'暂无数据';
  document.getElementById('monitorSummary').innerHTML=
    '<div class="stats-row">'+
      '<div class="stat-item"><div class="stat-label">监测话题</div><div class="stat-val topic-name" title="'+q+'">「'+q+'」</div></div>'+
      '<div class="stat-item"><div class="stat-label">上榜平台</div><div class="stat-val" style="font-size:18px">'+platformTags+'</div></div>'+
      '<div class="stat-item"><div class="stat-label">累计上榜</div><div class="stat-val" style="font-size:18px">'+daysText+'</div><div class="stat-sub">历史最高 #'+bestEver+'</div></div>'+
    '</div>';

  // Per-platform panels
  var html='';
  for(var k in data.platforms){var v=data.platforms[k];if(!v.found)continue;
    var records=v.records||[];
    html+='<div class="panel platform-card">';
    html+='<div class="panel-hd"><h2><span class="accent-dot" style="background:'+colors[k]+';box-shadow:0 0 6px '+colors[k]+'44"></span>'+names[k]+'</h2><span class="meta">'+(v.total_days||0)+' 天上榜  ·  '+v.first_date.slice(0,10)+' ~ '+v.last_date.slice(0,10)+'</span></div>';
    if(records.length>0){
      html+='<table><thead><tr><th>日期</th><th style="text-align:right">排名</th></tr></thead><tbody>';
      records.slice(-14).reverse().forEach(function(r){
        var rc=r.rank<=3?'<span style="color:'+colors[k]+';font-weight:700">#'+r.rank+'</span>':'#'+r.rank;
        html+='<tr><td style="font-size:13px;color:var(--ink-dim);padding:5px 10px">'+r.date.slice(0,10)+'</td><td style="text-align:right;font-weight:600;padding:5px 10px">'+rc+'</td></tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';
  }
  document.getElementById('monitorTable').innerHTML=html;
  // 微博话题详情 + 趋势
  if(data.platforms.weibo&&data.platforms.weibo.found){
    fetch('/api/topic-detail?q='+encodeURIComponent(q))
      .then(function(r){return r.json()})
      .then(function(detail){renderTopicDetail(detail)})
      .catch(function(){});
  }
}
function drawTrendChart(id,dataPoints,color){
  var c=document.getElementById(id);if(!c)return;
  var w=c.parentElement.clientWidth-36;c.width=w*2;c.height=240;c.style.width=w+'px';
  var ctx=c.getContext('2d');
  if(!dataPoints||dataPoints.length===0)return;
  var values=dataPoints.map(function(p){return p.value});
  var maxVal=Math.max.apply(null,values);
  if(maxVal===0)maxVal=1;
  var pad=30,h=240-pad*2;
  var stepX=dataPoints.length>1?(w*2-pad*2)/(dataPoints.length-1):w;
  // grid
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
  for(var i=1;i<=4;i++){var y=pad+(i*h/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w*2-pad,y);ctx.stroke()}
  // gradient fill
  var grad=ctx.createLinearGradient(0,pad,0,h+pad);
  grad.addColorStop(0,color+'40');grad.addColorStop(1,color+'00');
  ctx.fillStyle=grad;
  ctx.beginPath();
  dataPoints.forEach(function(p,i){var x=pad+i*stepX,y=pad+h-(p.value/maxVal)*h;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
  var lastX=pad+(dataPoints.length-1)*stepX;
  ctx.lineTo(lastX,h+pad);ctx.lineTo(pad,h+pad);ctx.closePath();ctx.fill();
  // line
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  dataPoints.forEach(function(p,i){var x=pad+i*stepX,y=pad+h-(p.value/maxVal)*h;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
  ctx.stroke();
  // dots
  if(dataPoints.length>0){
    ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(pad,pad+h-(dataPoints[0].value/maxVal)*h,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(lastX,pad+h-(dataPoints[dataPoints.length-1].value/maxVal)*h,4,0,Math.PI*2);ctx.fill();
  }
  // labels
  ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 20px -apple-system,sans-serif';
  if(dataPoints.length>0){
    ctx.fillText(dataPoints[0].time,pad,pad+h+22);
    ctx.fillText(dataPoints[dataPoints.length-1].time,lastX-50,pad+h+22);
    ctx.fillText(formatCount(maxVal),pad,pad-6);
  }
}
function renderTopicDetail(d){
  if(!d.has_data)return;
  var latest=d.latest;
  var html='<div class="panel" style="margin-top:14px">';
  html+='<div class="panel-hd"><h2><span class="accent-dot" style="background:var(--wb);box-shadow:0 0 6px rgba(255,59,92,.12)"></span>话题详情</h2><span class="meta">'+latest.time+' 抓取</span></div>';
  html+='<div class="detail-grid">';
  html+='<div class="detail-item"><div class="dv">'+formatCount(latest.read_count)+'</div><div class="dl">阅读量</div></div>';
  html+='<div class="detail-item"><div class="dv">'+formatCount(latest.mention_count)+'</div><div class="dl">讨论量</div></div>';
  html+='<div class="detail-item"><div class="dv">'+formatCount(latest.interact_count)+'</div><div class="dl">互动量</div></div>';
  html+='<div class="detail-item"><div class="dv">'+formatCount(latest.ori_count)+'</div><div class="dl">原创帖</div></div>';
  html+='</div>';
  if(d.trend){
    var trendTypes=[
      {key:'read',label:'阅读趋势',color:'#60a5fa'},
      {key:'discussion',label:'讨论趋势',color:'#f472b6'},
      {key:'interaction',label:'互动趋势',color:'#fbbf24'}
    ];
    html+='<div class="trend-block">';
    trendTypes.forEach(function(t){
      var points=d.trend[t.key];
      if(points&&points.length>0){
        var cid='trend_'+t.key;
        html+='<h4>'+t.label+'</h4>';
        html+='<canvas id="'+cid+'" width="900" height="240" style="width:100%;height:130px;margin:2px 0 8px"></canvas>';
      }
    });
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('monitorTable').insertAdjacentHTML('beforeend',html);
  setTimeout(function(){
    if(d.trend){
      [{key:'read',color:'#60a5fa'},{key:'discussion',color:'#f472b6'},{key:'interaction',color:'#fbbf24'}].forEach(function(t){
        var points=d.trend[t.key];
        if(points&&points.length>0)drawTrendChart('trend_'+t.key,points,t.color);
      });
    }
  },250);
}
// === Generate ===
async function doGenerate(){
  const input=document.getElementById('genInput').value.trim();
  const btn=document.getElementById('genBtn'),div=document.getElementById('genResult');
  if(!input){div.innerHTML='<p style="color:#f87171;font-size:13px">请输入事件描述</p>';return}
  btn.disabled=true;btn.textContent='生成中…';div.innerHTML='';
  try{
    const data=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:input})}).then(r=>r.json());
    if(data.error){div.innerHTML='<p style="color:#f87171;font-size:13px">'+data.error+'</p>'}
    else if(data.directions){
      let h='';data.directions.forEach(d=>{h+='<div class="gen-dir"><div class="dir-name">'+d.name+' '+d.score+'</div>';d.candidates.forEach(c=>h+='<div class="dir-cand">'+c+'</div>');h+='<div class="dir-meta">'+d.technique+' / '+d.emotion+'</div></div>'});
      if(data.top_pick)h+='<div class="gen-top"><strong>'+data.top_pick+'</strong><br><span style="font-size:12px;opacity:.6">'+data.reason+'</span></div>';
      div.innerHTML=h;
    }else{div.innerHTML='<pre style="font-size:12px;opacity:.7;white-space:pre-wrap">'+JSON.stringify(data,null,2)+'</pre>'}
  }catch(e){div.innerHTML='<p style="color:#f87171;font-size:13px">连接失败</p>'}
  btn.disabled=false;btn.textContent='生成文案';
}

// === Init ===
</script>
